<div class="p-5">
    <h2>Task List</h2>

    <div *ngFor="let task of getTasks() ; trackBy : trackById" class="mb-3 p-3 border border-[#ccc] flex justify-between">
        <input class="mr-2" type="checkbox" [checked]="task.completed" (change)="toggle(task.id)">
        <span [style.text-decoration] = "task.completed ? 'line-through' : 'none'">{{task.title}}</span>

        <button (click)="delete(task.id)" class="float-right bg-red-300 p-1 rounded cursor-pointer hover:bg-red-200 transition-all">Delele</button>
    </div>
</div>
